<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#07070E">
<title>تِكتِك</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#07070E;--c1:#0F0F1C;--c2:#161626;
  --gold:#D4A843;--gold2:#F5C518;
  --gd:rgba(212,168,67,.1);--gb:rgba(212,168,67,.2);
  --w:#F0EEE8;--g1:#9B9BBC;--g2:#6B6B8A;--g3:#2A2A3F;
  --red:#E84545;--grn:#2ECC71;--blu:#4A8FFF;
  --bd:rgba(255,255,255,.07);
  --f:'Tajawal',sans-serif;
  --TH:56px;--BH:64px;
}
html,body{height:100%;width:100%;background:var(--bg);font-family:var(--f);color:var(--w);overflow:hidden}
#app{position:fixed;inset:0;max-width:430px;margin:0 auto;display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes sp{to{transform:rotate(360deg)}}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes gl{0%,100%{box-shadow:0 0 20px rgba(212,168,67,.2)}50%{box-shadow:0 0 40px rgba(212,168,67,.4)}}
@keyframes sh{0%{background-position:200% center}100%{background-position:-200% center}}
.scr{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
.tb{height:var(--TH);min-height:var(--TH);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:var(--bg);border-bottom:1px solid var(--bd);z-index:5}
.tb-t{font-size:16px;font-weight:800}
.tb-s{font-size:10px;color:var(--g2);margin-top:1px}
.bn{height:var(--BH);min-height:var(--BH);flex-shrink:0;display:flex;align-items:center;justify-content:space-around;background:var(--c1);border-top:1px solid var(--bd);z-index:5}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;padding:6px 4px;min-height:48px}
.ni svg{color:var(--g2);transition:color .2s}
.ni .nl{font-size:9px;font-weight:700;color:var(--g2);letter-spacing:.3px;white-space:nowrap}
.ni.on svg,.ni.on .nl{color:var(--gold)}
.ni .nd{width:4px;height:4px;border-radius:50%;background:var(--gold);opacity:0;margin-top:1px}
.ni.on .nd{opacity:1}
.pg{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:12px 16px calc(var(--BH) + 12px)}
.pg::-webkit-scrollbar{display:none}
#sp-s{align-items:center;justify-content:center}
.sp-logo{width:92px;height:92px;border-radius:26px;background:var(--gd);border:1.5px solid var(--gb);display:flex;align-items:center;justify-content:center;animation:gl 2s ease infinite;margin-bottom:18px}
.sp-name{font-size:48px;font-weight:900;letter-spacing:-2px;line-height:1}
.sp-name em{color:var(--gold);font-style:normal}
.sp-line{width:40px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:11px auto}
.sp-sub{font-size:11px;color:var(--g2);letter-spacing:1.5px}
.sp-bar{width:120px;height:2px;background:var(--g3);border-radius:2px;margin-top:28px;overflow:hidden}
.sp-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2),var(--gold));background-size:200% auto;animation:sh 1.4s linear infinite}
#ob-s{overflow:hidden}
.ob-tr{flex:1;position:relative;overflow:hidden;touch-action:pan-y}
.ob-sl{position:absolute;inset:0;display:flex;flex-direction:column;padding:22px 18px 0;opacity:0;pointer-events:none;transition:opacity .3s ease,transform .3s cubic-bezier(.4,0,.2,1);transform:translateX(30px)}
.ob-sl.cur{opacity:1;pointer-events:all;transform:none}
.ob-sl.prv{opacity:0;transform:translateX(-30px)}
.ob-tag{display:inline-flex;background:var(--gd);border:1px solid var(--gb);border-radius:20px;padding:3px 10px;font-size:9px;font-weight:800;color:var(--gold);letter-spacing:1px;text-transform:uppercase;margin-bottom:9px;align-self:flex-start}
.ob-h{font-size:24px;font-weight:900;line-height:1.25;margin-bottom:7px}
.ob-h em{color:var(--gold);font-style:normal}
.ob-d{font-size:12px;color:var(--g1);line-height:1.75;margin-bottom:10px}
.ob-vis{flex:1;display:flex;align-items:center;justify-content:center;min-height:0}
.ob-vc{width:100%;background:var(--c1);border:1px solid var(--bd);border-radius:14px;padding:13px;overflow:hidden}
.ob-bot{height:112px;min-height:112px;flex-shrink:0;padding:9px 18px 14px;display:flex;flex-direction:column;justify-content:space-between}
.ob-dots{display:flex;gap:5px;justify-content:center}
.ob-dot{width:5px;height:5px;border-radius:3px;background:var(--g3);transition:all .28s}
.ob-dot.on{width:15px;background:var(--gold)}
.ob-acts{display:flex;gap:9px;align-items:center}
.ob-skip{font-size:11px;color:var(--g2);cursor:pointer;white-space:nowrap;padding:10px 5px;flex-shrink:0}
#au-s{overflow-y:auto;-webkit-overflow-scrolling:touch}
.au-bd{flex:1;padding:26px 18px 36px;display:flex;flex-direction:column}
.au-logo{font-size:28px;font-weight:900;letter-spacing:-1px;margin-bottom:22px}
.au-logo em{color:var(--gold);font-style:normal}
.au-lbl{font-size:10px;font-weight:800;color:var(--g2);letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px}
.au-ph{display:flex;background:var(--c1);border:1.5px solid var(--bd);border-radius:11px;overflow:hidden;margin-bottom:13px;transition:border-color .2s}
.au-ph:focus-within{border-color:var(--gold)}
.au-pre{padding:0 11px;font-size:13px;color:var(--g2);border-left:1px solid var(--bd);background:var(--c2);display:flex;align-items:center;height:48px;flex-shrink:0}
.au-in{flex:1;height:48px;padding:0 11px;background:transparent;border:none;outline:none;font-size:15px;color:var(--w);font-family:var(--f);direction:ltr}
.otp-row{display:flex;gap:7px;justify-content:center;margin:5px 0 16px;direction:ltr}
.otp-b{width:42px;height:52px;background:var(--c1);border:1.5px solid var(--bd);border-radius:10px;text-align:center;font-size:20px;font-weight:700;color:var(--w);outline:none;font-family:var(--f);transition:border-color .2s;caret-color:var(--gold)}
.otp-b:focus{border-color:var(--gold)}
.au-bk{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--g2);cursor:pointer;margin-bottom:16px;align-self:flex-start}
.btn{display:flex;align-items:center;justify-content:center;gap:5px;height:48px;border-radius:11px;font-size:14px;font-weight:800;border:none;cursor:pointer;font-family:var(--f);transition:transform .12s,opacity .12s;width:100%;flex-shrink:0}
.btn:active{transform:scale(.96);opacity:.85}
.btn:disabled{opacity:.4;pointer-events:none}
.btn-g{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000}
.btn-o{background:transparent;border:1.5px solid var(--bd);color:var(--w)}
.btn-r{background:rgba(232,69,69,.07);border:1.5px solid rgba(232,69,69,.18);color:var(--red)}
.btn-gr{background:rgba(46,204,113,.07);border:1.5px solid rgba(46,204,113,.18);color:var(--grn)}
.btn-sm{height:36px;border-radius:9px;font-size:12px;width:auto;padding:0 12px}
.cd{background:var(--c1);border:1px solid var(--bd);border-radius:12px;padding:12px;margin-bottom:10px}
.cd-g{background:rgba(212,168,67,.07);border-color:rgba(212,168,67,.18)}
.cd-gr{background:rgba(46,204,113,.04);border-color:rgba(46,204,113,.14)}
.cd-r{background:rgba(232,69,69,.04);border-color:rgba(232,69,69,.12)}
.h2{font-size:16px;font-weight:800;line-height:1.3}
.h3{font-size:13px;font-weight:700;line-height:1.4}
.sm{font-size:11px;color:var(--g1);line-height:1.7}
.lbl{font-size:9px;font-weight:800;color:var(--g2);letter-spacing:.9px;text-transform:uppercase}
.gold{color:var(--gold)}
.grn{color:var(--grn)}
.red{color:var(--red)}
.bx{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700;white-space:nowrap;gap:3px}
.bg{background:var(--gd);color:var(--gold)}
.bgr{background:rgba(46,204,113,.1);color:var(--grn)}
.br{background:rgba(232,69,69,.07);color:var(--red)}
.bb{background:rgba(74,143,255,.1);color:var(--blu)}
.row{display:flex;align-items:center;justify-content:space-between;gap:6px}
.dvd{height:1px;background:var(--bd);margin:9px 0}
.live{width:6px;height:6px;border-radius:50%;background:var(--grn);animation:pu 1.4s ease infinite;display:inline-block;flex-shrink:0}
.map{width:100%;height:185px;background:var(--c2);border-radius:13px;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;margin-bottom:11px;flex-shrink:0}
.map-g{position:absolute;inset:0;background-image:linear-gradient(rgba(212,168,67,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(212,168,67,.035) 1px,transparent 1px);background-size:24px 24px}
.map-p{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 8px rgba(212,168,67,.12),0 0 0 16px rgba(212,168,67,.05);z-index:2;position:relative}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:11px}
.st{background:var(--c1);border:1px solid var(--bd);border-radius:11px;padding:11px 8px;text-align:center}
.sv{font-size:20px;font-weight:900;color:var(--gold)}
.sl-t{font-size:9px;color:var(--g2);font-weight:700;margin-top:3px;line-height:1.3}
.tg{display:flex;background:var(--c2);border-radius:50px;padding:3px;gap:3px;margin-bottom:11px}
.to{flex:1;padding:8px;text-align:center;border-radius:44px;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;color:var(--g2);white-space:nowrap}
.to.on{background:var(--gold);color:#000}
.sw-row{display:flex;align-items:center;justify-content:space-between;background:var(--c1);border:1px solid var(--bd);border-radius:12px;padding:12px 14px;margin-bottom:11px}
.sw{width:46px;height:25px;border-radius:50px;background:var(--g3);position:relative;cursor:pointer;transition:background .25s;flex-shrink:0}
.sw.on{background:var(--grn)}
.sw-k{width:19px;height:19px;border-radius:50%;background:#fff;position:absolute;top:3px;right:3px;transition:right .25s;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.sw.on .sw-k{right:24px}
.fi{width:100%;height:44px;padding:0 11px;background:var(--c1);border:1.5px solid var(--bd);border-radius:10px;color:var(--w);font-size:13px;font-family:var(--f);outline:none;transition:border-color .2s;margin-bottom:9px}
.fi:focus{border-color:var(--gold)}
textarea.fi{height:auto;padding:10px 11px;resize:none}
.pi{display:flex;align-items:center;padding:11px 12px;background:var(--c1);border:1px solid var(--bd);border-radius:10px;margin-bottom:7px;cursor:pointer;gap:9px}
.pi-ic{width:32px;height:32px;background:var(--c2);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pi-tx{flex:1;min-width:0}
.pi-tx .h3{font-size:12px}
.pi-tx .sm{font-size:10px;margin-top:1px}
.up{width:100%;height:76px;background:var(--c2);border:1.5px dashed rgba(212,168,67,.22);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:5px;margin-bottom:8px}
.up.done{border-color:rgba(46,204,113,.35);background:rgba(46,204,113,.03)}
.up-lb{font-size:10px;color:var(--g2)}
.pnd{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 18px;text-align:center}
#nt{position:fixed;top:12px;left:50%;transform:translateX(-50%) translateY(-60px);max-width:88%;background:var(--c2);border:1px solid var(--bd);border-radius:10px;padding:9px 14px;font-size:12px;font-weight:600;z-index:9999;white-space:nowrap;pointer-events:none;transition:transform .26s cubic-bezier(.4,0,.2,1)}
#nt.show{transform:translateX(-50%) translateY(0)}
#nt.ok{border-color:rgba(46,204,113,.3);color:var(--grn)}
#nt.er{border-color:rgba(232,69,69,.3);color:var(--red)}
#nt.in{border-color:var(--gb);color:var(--gold)}
.spin{width:17px;height:17px;border-radius:50%;border:2.5px solid rgba(212,168,67,.2);border-top-color:var(--gold);animation:sp .7s linear infinite;display:inline-block}
#dr-s{overflow-y:auto;-webkit-overflow-scrolling:touch}
.sec{margin-bottom:9px;display:flex;align-items:center;justify-content:space-between}
/* btn-xs: used in admin driver/user lists */
.btn-xs{height:30px;border-radius:8px;font-size:10px;font-weight:700;padding:0 10px;border:none;cursor:pointer;font-family:var(--f);white-space:nowrap;transition:transform .12s}
.btn-xs:active{transform:scale(.94)}
</style>

/* ONBOARDING */
function OBs(){
  const s=mk('div','scr');s.id='ob-s';

  OB.forEach((sl,i)=>{
    const d=mk('div',`ob-sl ${i===S.obi?'cur':i<S.obi?'prv':''}`);

    tr.appendChild(d);
  });
  let tx=0;
  tr.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
  tr.addEventListener('touchend',e=>{
    const dd=tx-e.changedTouches[0].clientX;
    if(Math.abs(dd)>44){if(dd>0&&S.obi<OB.length-1){S.obi++;R();}else if(dd<0&&S.obi>0){S.obi--;R();}}
  },{passive:true});
  const bot=mk('div','ob-bot');
  bot.innerHTML=`<div class="ob-dots">${OB.map((_,i)=>`<div class="ob-dot ${i===S.obi?'on':''}"></div>`).join('')}</div><div class="ob-acts"><button class="btn btn-g" id="ob-nx" style="flex:1">${S.obi===OB.length-1?'ابدأ الآن':'التالي'}</button><button class="btn btn-o" id="ob-drv" style="flex:1;font-size:12px;height:44px;border-radius:10px">تسجيل كسائق</button></div>`;

}

async function loadDriverStats(){
  if(!S.token)return;
  try{
    const [tripRes,walRes]=await Promise.all([
      fetch(`${API}/api/my-trips`,{headers:{'Authorization':`Bearer ${S.token}`}}),
      fetch(`${API}/api/driver/wallet`,{headers:{'Authorization':`Bearer ${S.token}`}}),
    ]);
    const trips=await tripRes.json();
    const wal=await walRes.json();
    const today=new Date().toLocaleDateString('en-CA');
    const todayTrips=(trips.data||[]).filter(t=>t.status==='completed'&&t.completed_at?.startsWith(today)).length;
    const todayEarnings=(trips.data||[]).filter(t=>t.status==='completed'&&t.completed_at?.startsWith(today)).reduce((s,t)=>s+(t.driver_net||0),0);
    const e0=document.getElementById('dStat0'); if(e0) e0.textContent=todayTrips;
    const e1=document.getElementById('dStat1'); if(e1) e1.textContent=(wal.wallet?.balance||S.user?.wallet_balance||0).toLocaleString();
    const e2=document.getElementById('dStat2'); if(e2) e2.textContent=S.user?.rating||'5.0';
    const e3=document.getElementById('dStat3'); if(e3) e3.textContent=todayEarnings.toLocaleString();
    if(S.user&&wal.wallet) S.user.wallet_balance=wal.wallet.balance;
  }catch(e){}
}

/* iOS-SAFE MODAL — replaces confirm() and prompt() */
/**
 * showModal(options)
 * options: {
 *   title: string,
 *   message: string,
 *   confirmText: string (default 'تأكيد'),
 *   cancelText: string (default 'إلغاء'),
 *   input: boolean (default false) — show text input,
 *   inputPlaceholder: string,
 *   inputDefault: string,
 *   confirmStyle: 'danger'|'safe' (default 'safe')
 * }
 * Returns Promise<{confirmed: bool, value: string|null}>
 */
function showModal({title='تأكيد',message='',confirmText='تأكيد',cancelText='إلغاء',input=false,inputPlaceholder='',inputDefault='',confirmStyle='safe'}={}){
  return new Promise(resolve=>{
    // Remove any existing modal
    document.getElementById('iosModal')?.remove();
    const bg=document.createElement('div');
    bg.id='iosModal';
    bg.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:9000;display:flex;align-items:flex-end;animation:fi .18s ease';
    const btnColor=confirmStyle==='danger'?'var(--red)':'var(--gold)';
    const btnBg=confirmStyle==='danger'?'rgba(232,69,69,.12)':'rgba(212,168,67,.12)';
    bg.innerHTML=`
      <div style="background:var(--c1);border-radius:20px 20px 0 0;padding:22px 20px 32px;width:100%;animation:fu .22s ease">
        <div style="font-size:15px;font-weight:800;margin-bottom:${message?'6px':'0'};text-align:center">${title}</div>
        ${message?`<div style="font-size:12px;color:var(--g1);line-height:1.6;text-align:center;margin-bottom:${input?'12px':'0'}">${message}</div>`:''}
        ${input?`<input id="iosModalInput" class="fi" placeholder="${inputPlaceholder}" value="${inputDefault}" style="margin-top:10px;margin-bottom:0">`:''}
        <div style="display:flex;gap:9px;margin-top:18px">
          <button id="iosModalCancel" style="flex:1;height:46px;border-radius:12px;background:var(--c2);border:1px solid var(--bd);color:var(--g1);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--f)">${cancelText}</button>
          <button id="iosModalConfirm" style="flex:1;height:46px;border-radius:12px;background:${btnBg};border:1.5px solid ${btnColor};color:${btnColor};font-size:13px;font-weight:800;cursor:pointer;font-family:var(--f)">${confirmText}</button>
        </div>
      </div>
    `;
    document.body.appendChild(bg);
    if(input) document.getElementById('iosModalInput')?.focus();
    document.getElementById('iosModalConfirm').addEventListener('click',()=>{
      const val=input?(document.getElementById('iosModalInput')?.value?.trim()||''):null;
      bg.remove();
      resolve({confirmed:true,value:val});
    });
    document.getElementById('iosModalCancel').addEventListener('click',()=>{
      bg.remove();
      resolve({confirmed:false,value:null});
    });
    // Tap outside to dismiss (= cancel)
    bg.addEventListener('click',e=>{
      if(e.target===bg){bg.remove();resolve({confirmed:false,value:null});}
    });
  });
}

async function doSendOTP(){

  S.ph=ph;
  const b=$('sOTP');if(b){b.disabled=true;b.innerHTML=`<span class="spin"></span>`;}
  try{
    const r=await fetch(`${API}/api/auth/send-otp`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:`+964${ph}`})});
    const d=await r.json();
    if(d.success){S.as='otp';S.otp=Array(6).fill('');R();startTimer();N('تم إرسال الكود','ok');}
    else{if(b){b.disabled=false;b.innerHTML='إرسال كود التحقق';}N(d.error||'خطأ','er');}
  }catch(e){if(b){b.disabled=false;b.innerHTML='إرسال كود التحقق';}N('تعذر الاتصال','er');}
}
async function doVerOTP(){
  const otp=S.otp.join('');

  const b=$('vOTP');if(b){b.disabled=true;b.innerHTML=`<span class="spin"></span>`;}

}

// ── SOCKET.IO ────────────────────────────────────────────
let _socket=null;
let _gpsInterval=null;
function initSocket(token){
  if(_socket) _socket.disconnect();
  try{
    _socket=io(API,{auth:{token},transports:['websocket','polling']});
    _socket.on('connect',()=>console.log('🔌 Socket connected'));
    _socket.on('disconnect',()=>console.log('❌ Socket disconnected'));
    // إشعارات واردة
    _socket.on('notification',({title,message})=>{
      N(`${title}: ${message}`,'in');
    });
    // طلب رحلة جديد للسائق
    _socket.on('trip:new_request',(data)=>{
      // Driver-a FIX: show on ALL tabs — driver must not miss a request
      // D-HOTFIX: only show if driver has no active trip
      if(S.utype==='driver'){
        const isDriverBusy = S.currentTrip &&
          ['accepted','ongoing'].includes(S.currentTrip.status);
        if(!isDriverBusy){
          showTripRequest(data);
        }
        // if busy: silently ignore — backend already won't dispatch to busy drivers
      }
    });
    // الزبون — تحديثات الرحلة + تحديث state
    _socket.on('trip:accepted',()=>{
      if(S.currentTrip) S.currentTrip.status='accepted';
      N('تم قبول رحلتك من سائق ✅','ok');
    });
    _socket.on('trip:started',()=>{
      if(S.currentTrip) S.currentTrip.status='ongoing';
      N('بدأت رحلتك الآن 🛺','ok');
    });
    _socket.on('trip:completed',()=>{
      S.currentTrip=null;
      const btn=document.getElementById('reqBtn');
      if(btn){btn.disabled=false;btn.textContent='اطلب تكتك الآن';}
      N('اكتملت رحلتك بنجاح ✅','ok');
    });
    _socket.on('trip:cancelled',()=>{
      S.currentTrip=null;
      const btn=document.getElementById('reqBtn');
      if(btn){btn.disabled=false;btn.textContent='اطلب تكتك الآن';}
      N('تم إلغاء الرحلة','er');
    });
    // E-HOTFIX: no nearby driver found — show waiting message to user
    _socket.on('trip:waiting',({trip_id,message})=>{
      // Update searching overlay message if visible
      const timerEl=document.getElementById('searchTimer');
      const overlay=document.getElementById('searchOverlay');
      if(overlay){
        const msgEl=overlay.querySelector('.h2');
        if(msgEl) msgEl.textContent='لا يوجد سائق قريب حالياً';
        const subEl=overlay.querySelector('.sm');
        if(subEl) subEl.textContent='نبحث باستمرار — سيصلك إشعار عند توفر سائق';
        if(timerEl) timerEl.style.display='none'; // hide countdown
      }
      N(message||'لا يوجد سائق قريب — نبحث باستمرار','in');
    });
    // B2: driver location update for user during active trip
    _socket.on('trip:driver_moved',({lat,lng})=>{
      // Update S.driverLocation for future map integration
      S.driverLocation={lat,lng};
      // Update active trip status bar if visible
      const locEl=document.getElementById('driverLocStatus');
      if(locEl) locEl.textContent=`السائق في الطريق (${lat.toFixed(4)}, ${lng.toFixed(4)})`;
    });
    // إرسال GPS إذا السائق متصل
    if(S.utype==='driver'&&S.don){
      window._gpsIntervalRef = setInterval(()=>{
        if(!S.don||!_socket?.connected)return;
        if(navigator.geolocation){
          navigator.geolocation.getCurrentPosition(pos=>{
            _socket.emit('driver:location',{
              lat:pos.coords.latitude,
              lng:pos.coords.longitude,
              trip_id:S.currentTrip?.id||null
            });
          },()=>{});
        }
      },10000);
    }
    // إدارة — طلب جديد
    _socket.on('admin:new_driver_request',(data)=>{
      N(`طلب تسجيل جديد: ${data.name}`,'in');
    });
  }catch(e){ console.log('Socket error:', e); }
}

// N-10 FIX: persistent searching status for user
function showTripSearching(tripId){
  // Remove any existing overlay
  document.getElementById('searchOverlay')?.remove();
  const overlay=document.createElement('div');
  overlay.id='searchOverlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(7,7,14,.92);z-index:400;display:flex;align-items:flex-end';
  overlay.innerHTML=`
    <div style="background:var(--c1);border-radius:20px 20px 0 0;padding:24px 20px 32px;width:100%;animation:fu .3s ease">
      <div style="text-align:center;margin-bottom:18px">
        <div style="width:56px;height:56px;border-radius:50%;background:var(--gd);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;margin:0 auto 10px">
          ${I.tuk('#D4A843',26)}
        </div>
        <div class="h2" style="margin-bottom:4px">نبحث عن سائق</div>
        <div class="sm" style="font-size:10px">سيصلك سائق خلال دقائق</div>
      </div>
      <div style="background:var(--c2);border-radius:11px;padding:14px;margin-bottom:14px;text-align:center">
        <div style="font-size:32px;font-weight:900;color:var(--gold)" id="searchTimer">60</div>
        <div class="sm" style="font-size:10px;margin-top:2px">ثانية</div>
      </div>
      <div id="driverLocStatus" style="font-size:9px;color:var(--g2);text-align:center;margin-bottom:8px;min-height:14px"></div>
      <button class="btn btn-r" id="cancelSearchBtn" style="height:44px;font-size:13px">إلغاء الطلب</button>
    </div>
  `;
  document.body.appendChild(overlay);
  let sec=60;
  const timer=setInterval(()=>{
    sec--;
    const el=document.getElementById('searchTimer');
    if(el) el.textContent=sec;
    if(sec<=0){
      clearInterval(timer);
      overlay.remove();
      // N-1 FIX: call no-driver endpoint to free the trip
      if(tripId&&S.token){
        fetch(`${API}/api/trips/${tripId}/no-driver`,{method:'POST',headers:{'Authorization':`Bearer ${S.token}`,'Content-Type':'application/json'}})
        .then(r=>r.json())
        .then(d=>{
          if(d.changed) N('لا يوجد سائق متاح حالياً، حاول مرة أخرى','er');
          S.currentTrip=null;
          const btn=document.getElementById('reqBtn');
          if(btn){btn.disabled=false;btn.textContent='اطلب تكتك الآن';}
        }).catch(()=>{});
      }
    }
  },1000);
  // Cancel button
  document.getElementById('cancelSearchBtn')?.addEventListener('click',async()=>{
    clearInterval(timer);
    overlay.remove();
    if(tripId&&S.token){
      try{
        await fetch(`${API}/api/trips/${tripId}/cancel`,{method:'POST',headers:{'Authorization':`Bearer ${S.token}`,'Content-Type':'application/json'}});
        N('تم إلغاء الطلب','ok');
      }catch(e){}
    }
    S.currentTrip=null;
    const btn=document.getElementById('reqBtn');
    if(btn){btn.disabled=false;btn.textContent='اطلب تكتك الآن';}
  });
  // Auto-dismiss if trip accepted via socket
  const onAccepted=()=>{
    clearInterval(timer);
    overlay.remove();
    document.getElementById('reqBtn')&&(document.getElementById('reqBtn').textContent='اطلب تكتك الآن');
  };
  if(_socket) _socket.once('trip:accepted', onAccepted);
}

function showTripRequest(data){
  // D-HOTFIX: second line of defense — don't show if driver is on active trip
  if(S.currentTrip && ['accepted','ongoing'].includes(S.currentTrip.status)){
    return; // driver is busy — backend should not have dispatched, but guard here too
  }
  // NEW-1 FIX: remove existing request overlay before creating new one
  document.getElementById('tripRequestOverlay')?.remove();
  const overlay=document.createElement('div');
  overlay.id='tripRequestOverlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:flex-end';
  overlay.innerHTML=`
    <div style="background:var(--c1);border-radius:20px 20px 0 0;padding:24px 20px 32px;width:100%;animation:fu .3s ease">
      <div style="text-align:center;margin-bottom:16px">
        <div style="width:52px;height:52px;border-radius:50%;background:var(--gd);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;margin:0 auto 8px;font-size:22px;font-weight:900;color:var(--gold)" id="reqTimer">60</div>
        <div class="h2">طلب رحلة جديد!</div>
      </div>
      <div class="cd" style="margin-bottom:14px">
        <div class="row" style="margin-bottom:7px">
          <div class="sm" style="font-size:10px">من: ${data.pickup_addr||'موقع الزبون'}</div>
        </div>
        <div class="row">
          <div class="sm" style="font-size:10px">إلى: ${data.dropoff_addr||'الوجهة'}</div>
          <div style="font-size:14px;font-weight:900;color:var(--gold)">${data.price?data.price.toLocaleString()+' د':'مجانية'}</div>
        </div>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-gr" id="acceptTripBtn" style="flex:1">قبول الرحلة</button>
        <button class="btn btn-r" id="rejectTripBtn" style="flex:1">رفض</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  let sec=60;
  const timer=setInterval(()=>{
    sec--;
    const el=document.getElementById('reqTimer');
    if(el) el.textContent=sec;
    if(sec<=0){clearInterval(timer);overlay.remove();}
  },1000);
  document.getElementById('acceptTripBtn')?.addEventListener('click',async()=>{
    clearInterval(timer);overlay.remove();
    try{
      const r=await fetch(`${API}/api/trips/${data.trip_id}/accept`,{method:'POST',headers:{'Authorization':`Bearer ${S.token}`,'Content-Type':'application/json'}});
      const d2=await r.json();
      if(d2.success){
        N('قبلت الرحلة ✅','ok');
        S.currentTrip={id:data.trip_id,status:'accepted',...data};
        showActiveTripDriver(data.trip_id, data.pickup_addr||'موقع الزبون', data.dropoff_addr||'الوجهة');
      } else N(d2.error,'er');
    }catch(e){N('تعذر الاتصال','er');}
  });
  document.getElementById('rejectTripBtn')?.addEventListener('click',async()=>{
    clearInterval(timer);overlay.remove();
    // E-HOTFIX: notify backend to skip immediately to next driver
    if(data.trip_id&&S.token){
      try{
        await fetch(`${API}/api/trips/${data.trip_id}/skip-driver`,{
          method:'POST',
          headers:{'Authorization':`Bearer ${S.token}`,'Content-Type':'application/json'}
        });
      }catch(e){} // silent — backend has 30s timer as fallback anyway
    }
  });
}

// B2: Active trip panel for driver — Start, Complete, SOS
function showActiveTripDriver(tripId, pickupAddr, dropoffAddr){
  document.getElementById('driverTripOverlay')?.remove();
  const overlay=document.createElement('div');
  overlay.id='driverTripOverlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(7,7,14,.95);z-index:450;display:flex;align-items:flex-end';
  let tripStatus='accepted';
  function render(){
    overlay.innerHTML=`
      <div style="background:var(--c1);border-radius:20px 20px 0 0;padding:22px 18px 30px;width:100%">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
          <div class="h2">رحلة نشطة</div>
          <div class="bx ${tripStatus==='accepted'?'bg':tripStatus==='ongoing'?'bgr':'br'}">
            ${tripStatus==='accepted'?'مقبولة':tripStatus==='ongoing'?'جارية':'منتهية'}
          </div>
        </div>
        <div class="cd" style="margin-bottom:12px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <div style="width:8px;height:8px;border-radius:50%;background:var(--gold);flex-shrink:0"></div>
            <div class="sm" style="font-size:11px">${pickupAddr}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <div style="width:8px;height:8px;border-radius:50%;background:var(--grn);flex-shrink:0"></div>
            <div class="sm" style="font-size:11px">${dropoffAddr}</div>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px">
          ${tripStatus==='accepted'?`
            <button class="btn btn-g" id="startTripBtn">ابدأ الرحلة</button>
          `:''}
          ${tripStatus==='ongoing'?`
            <button class="btn btn-g" id="completeTripBtn">أكمل الرحلة</button>
          `:''}
          <div style="display:flex;gap:8px">
            <button class="btn btn-r" id="sosBtn" style="flex:1;height:42px;font-size:12px">🆘 طوارئ</button>
            ${tripStatus!=='ongoing'?`<button class="btn btn-o" id="cancelTripBtn" style="flex:1;height:42px;font-size:12px">إلغاء</button>`:''}
          </div>
        </div>
      </div>
    `;
    // Start trip
    overlay.querySelector('#startTripBtn')?.addEventListener('click',async()=>{
      try{
        const r=await fetch(`${API}/api/trips/${tripId}/start`,{method:'POST',headers:{'Authorization':`Bearer ${S.token}`,'Content-Type':'application/json'}});
        const d=await r.json();
        if(d.success){
          tripStatus='ongoing';
          if(S.currentTrip) S.currentTrip.status='ongoing'; // D-HOTFIX: keep state accurate
          render();N('بدأت الرحلة','ok');
        }
        else N(d.error,'er');
      }catch(e){N('تعذر الاتصال','er');}
    });
    // Complete trip
    overlay.querySelector('#completeTripBtn')?.addEventListener('click',async()=>{
      try{
        const r=await fetch(`${API}/api/trips/${tripId}/complete`,{method:'POST',headers:{'Authorization':`Bearer ${S.token}`,'Content-Type':'application/json'}});
        const d=await r.json();
        if(d.success){
          overlay.remove();
          S.currentTrip=null;
          N(`اكتملت الرحلة — صافي: ${d.driver_net?.toLocaleString()||0} د`,'ok');
          loadDriverStats();
        } else N(d.error,'er');
      }catch(e){N('تعذر الاتصال','er');}
    });
    // SOS
    overlay.querySelector('#sosBtn')?.addEventListener('click',()=>{
      if(_socket&&tripId){
        // SOS-a FIX: use last known GPS location from S.driverLocation
        const sosLat=S.driverLocation?.lat||null;
        const sosLng=S.driverLocation?.lng||null;
        _socket.emit('trip:sos',{trip_id:tripId,lat:sosLat,lng:sosLng});
        N('🆘 تم إرسال إشعار الطوارئ للإدارة','er');
      }
    });
    // Cancel (only when accepted, not ongoing)
    overlay.querySelector('#cancelTripBtn')?.addEventListener('click',async()=>{
      try{
        const r=await fetch(`${API}/api/trips/${tripId}/cancel`,{method:'POST',headers:{'Authorization':`Bearer ${S.token}`,'Content-Type':'application/json'}});
        const d=await r.json();
        if(d.success){overlay.remove();S.currentTrip=null;N('تم إلغاء الرحلة','ok');}
        else N(d.error,'er');
      }catch(e){N('تعذر الاتصال','er');}
    });
  }
  render();
  document.body.appendChild(overlay);
  // trip:cancelled → close overlay
  if(_socket) _socket.once('trip:cancelled',()=>{overlay.remove();S.currentTrip=null;});
}

let _tmr;
function startTimer(){
  S.otpT=60;clearInterval(_tmr);
  _tmr=setInterval(()=>{S.otpT--;const e=$('tmrN');if(e)e.textContent=S.otpT>0?`${S.otpT}s`:'أعد الإرسال';if(S.otpT<=0)clearInterval(_tmr);},1000);
}

async function init(){
  R();
  setTimeout(async()=>{
    if(S.token){
      try{
        const r=await fetch(`${API}/api/auth/me`,{headers:{'Authorization':`Bearer ${S.token}`}});
        const d=await r.json();
        if(d.success){
          S.user=d.data;
          const uPh=(S.user?.phone||'').replace('+964','0').replace('+','');
          const aPh=ADMIN_PH.replace('+964','0').replace('+','');
          S.utype=(uPh===aPh||S.user?.phone===ADMIN_PH||S.user?.phone==='+9647823210125')?'admin':d.user_type;
          localStorage.setItem('tk_type',S.utype);
          // استعادة حالة السائق
          if(S.utype==='driver') S.don = S.user?.status==='online';
          initSocket(S.token);
          S.sc='app';S.tab='home';R();return;
        }
      }catch(e){}
      localStorage.removeItem('tk_token');localStorage.removeItem('tk_type');
      S.utype=null;S.user=null;
    }
    S.sc='ob';R();
  },2400);
}
init();
</script>
